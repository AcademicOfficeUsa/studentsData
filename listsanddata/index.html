<script>
function checkAccess() {
  var email = (document.getElementById("email").value || "").trim();
  var errBox = document.getElementById("errBox");
  var successBox = document.getElementById("successBox");

  errBox.style.display = "none";
  successBox.style.display = "none";

  if (!email) {
    document.getElementById("errText").textContent = "Please enter your school email address.";
    errBox.style.display = "flex";
    return;
  }

  if (email.toLowerCase().endsWith("@schoolofstjude.co.tz")) {
    successBox.style.display = "flex";
    setTimeout(function() { window.location.href = "Dashboard.html"; }, 1200);
  } else {
    document.getElementById("errText").textContent =
      "Access denied. Only @schoolofstjude.co.tz accounts are permitted.";
    errBox.style.display = "flex";
  }
}
</script>
